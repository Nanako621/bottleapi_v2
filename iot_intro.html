<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>大學生健康 IoT 平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: 'ProperScript';
      src: url('ProperScript-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    html, body, * {
      font-family: 'ProperScript', "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    :root {
      --primary: #2db7d3;
      --primary-dark: #1d8fa8;
      --text: #1f2937;
      --muted: #6b7280;
      --white: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15,23,42,0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      color: var(--text);
      background: #f8fafc;
      scroll-behavior: smooth;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== Navbar ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; height: 88px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
    }

    .brand { font-size: 24px; font-weight: 500; color: #374151; letter-spacing: 0.02em; }

    /* 導覽列排版保持一致 */
    .nav-links { display: flex; align-items: center; gap: 34px; font-size: 16px; color: #6b7280; }

    /* 增加平滑顏色切換效果 */
    .nav-links a {
      transition: color 0.3s ease;
      cursor: pointer;
    }

    /* 點選後或是滑鼠移入時顯示藍色並加粗 */
    .nav-links a:hover, 
    .nav-links a.active { 
      color: var(--primary); 
      font-weight: 600; 
    }

    .nav-gear {
      width: 44px; height: 44px; border: 1px solid #d1d5db; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #9ca3af; font-size: 20px;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative; min-height: 740px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 140px 24px 80px;
      background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), url("health-bg.png") center center / cover no-repeat;
    }

    .hero-title {
      font-size: 72px; font-weight: 500; line-height: 1.2; margin-bottom: 28px; color: #2db7d3;
      text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 4px 20px rgba(0,0,0,0.2);
    }

    .hero-desc { font-size: 18px; line-height: 2; color: #4b5563; max-width: 800px; margin: 0 auto 42px; }

    .hero-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 320px; padding: 20px 32px; background: var(--primary);
      color: #fff; border: none; border-radius: 999px; font-size: 22px; font-weight: 700;
      cursor: pointer; box-shadow: var(--shadow); transition: all .2s ease;
    }
    .hero-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 1000; display: none; align-items: center; justify-content: center;
    }

    .modal-content {
      background: white; padding: 40px; border-radius: 24px;
      width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-content input {
      width: 100%; padding: 14px; margin-bottom: 12px;
      border: 1px solid #e5e7eb; border-radius: 12px; font-size: 16px;
    }

    /* ===== Features & Sections ===== */
    .section { padding: 80px 24px; background: #fff; }
    .section-inner { max-width: 1200px; margin: 0 auto; }
    .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
    .feature-card { padding: 30px; border: 1px solid #eee; border-radius: 20px; box-shadow: var(--shadow); }

    .ai-assistant {
      position: fixed; right: 30px; bottom: 30px; z-index: 120;
      background: linear-gradient(135deg,#f5ecff,#efe7ff); color: #7c3aed;
      border: 1px solid #e9d5ff; border-radius: 999px; padding: 15px 25px;
      font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .close-btn { margin-top: 15px; background: none; border: none; color: #9ca3af; cursor: pointer; }
  
  /* 負責控制聯絡我們整個區塊的排版與背景 */
#contact {
  padding: 80px 20px;
  text-align: center;
  background: #fff; /* 或原本的背景色 */
}

/* 負責控制表單整體的寬度與置中 */
#contact form {
  max-width: 400px;
  margin: 20px auto; /* auto 負責水平置中，20px 控制與上方標題的距離 */
}

/* 關鍵修正：負責控制輸入框與留言框的大小與下方間距 */
#contact input, 
#contact textarea {
  width: 100%;       /* 填滿父容器(form)的 400px 寬度 */
  padding: 10px;      /* 增加內距，讓文字不會貼邊 */
  margin-bottom: 12px; /* 關鍵：這是控制框與框之間距離的 Margin */
  border: 1px solid #e5e7eb; /* 恢復原本細細的框線 */
  border-radius: 8px; /* 恢復圓角 */
}

/* 負責送出按鈕的樣式 */
#contact button {
  background: #2db7d3; /* 恢復原本亮藍色 */
  color: #fff;
  border: none;
  padding: 12px 24px;  /* 增加按鈕內距，讓它大一點 */
  border-radius: 999px; /* 膠囊狀 */
  font-size: 18px;     /* 恢復字體大小 */
  margin-top: 10px;    /* 增加按鈕與留言框的距離 */
}
  </style>
</head>
<body>

  <header class="navbar">
    <div class="brand">大學生健康IoT平台</div>
    <nav class="nav-links">
      <a href="#" class="active">首頁</a>
      <a href="#services">服務</a>
      <a href="#contact">聯絡</a>
      <a href="javascript:void(0)" onclick="openModal('loginModal')">登入</a>
      <div class="nav-gear"> ◡̈ </div> 
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">連結健康，改善生活。</h1>
      <p class="hero-desc">專業的物聯網監測服務，結合穿戴式裝置與健康儀表板，協助大學生掌握作息變化。</p>
      <button class="hero-btn" onclick="openModal('loginModal')">開始使用智慧監測系統</button>
    </div>
  </section>

  <section class="section" id="services">
    <div class="section-inner">
      <h2 style="text-align:center; font-size:32px;">平台核心服務</h2>
      <div class="feature-grid">
        <div class="feature-card"><h3>⌚ 即時健康監測</h3><p>串接感測資料，掌握心率與睡眠狀況。</p></div>
        <div class="feature-card"><h3>📊 健康趨勢分析</h3><p>圖表呈現每日變化，觀察生活習慣關聯。</p></div>
        <div class="feature-card"><h3>🤖 智慧提醒建議</h3><p>主動提供作息異常提醒與 AI 調整建議。</p></div>
      </div>
    </div>
  </section>

  <section id="contact">
  <h2 class="section-title">聯絡我們</h2>
  <p class="section-desc">有任何問題或建議，歡迎留下訊息</p>

  <form id="contactForm">
    <input type="text" id="contactName" placeholder="你的姓名" required>
    <input type="email" id="contactEmail" placeholder="你的Email" required>
    <textarea id="contactMsg" placeholder="想說的話..." required></textarea>
    <button type="submit">送出</button>
    </form>
  </section>

  <div id="loginModal" class="modal-overlay">
    <div class="modal-content">
      <h3>會員登入</h3>
      <form onsubmit="handleLogin(event)">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="密碼" required>
        <button type="submit" class="hero-btn" style="min-width:100%; margin-top:10px;">登入</button>
      </form>
      <p style="margin-top:15px; font-size:14px;">
        還沒有帳號？ <a href="javascript:void(0)" onclick="switchModal('loginModal', 'registerModal')" style="color:#2db7d3; font-weight:700;">立即註冊</a>
      </p>
      <button onclick="closeModal('loginModal')" class="close-btn">關閉視窗</button>
    </div>
  </div>

  <div id="registerModal" class="modal-overlay">
    <div class="modal-content">
      <h3>加入我們</h3>
      <form onsubmit="handleRegister(event)">
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="設定密碼 (至少6位英數)" required>
        <input type="password" id="confirmPassword" placeholder="確認密碼" required>
        <button type="submit" class="hero-btn" style="min-width:100%; margin-top:10px;">完成註冊</button>
      </form>
      <p style="margin-top:15px; font-size:14px;">
        已有帳號？ <a href="javascript:void(0)" onclick="switchModal('registerModal', 'loginModal')" style="color:#2db7d3; font-weight:700;">返回登入</a>
      </p>
      <button onclick="closeModal('registerModal')" class="close-btn">關閉視窗</button>
    </div>
  </div>


  <script>
    // 彈窗控制
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function switchModal(closeId, openId) { closeModal(closeId); openModal(openId); }

    // 導覽列 Active 狀態切換邏輯
    const links = document.querySelectorAll('.nav-links a');
    links.forEach(link => {
      link.addEventListener('click', function() {
        // 移除所有連結的 active 樣式
        links.forEach(l => l.classList.remove('active'));
        // 幫目前點擊的連結加上 active 樣式
        this.classList.add('active');
      });
    });

    // 登入處理
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        
        const result = await response.json();
        
        if (response.ok) {
          localStorage.setItem("user_email", email); 
          alert('登入成功！請先填寫/確認您的基本健康資料。');
          window.location.href = 'patient_entry.html'; 
        } else {
          alert('登入失敗：' + (result.message || '請檢查帳號密碼'));
        }
      } catch (error) {
        console.error('Login Error:', error);
        alert('無法連接到伺服器，請確保 Python 程式正在運行。');
      }
    }
  
    // 註冊處理
    async function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const passwordRule = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;

      if (!passwordRule.test(password)) {
        alert('密碼格式不正確：請輸入至少 6 位字元，並包含英文字母與數字。');
        return;
      }
      if (password !== confirmPassword) {
        alert('密碼與確認密碼不符！');
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        const result = await response.json();
        if (response.ok) {
          alert('註冊成功！資料已寫入資料庫');
          switchModal('registerModal', 'loginModal'); 
        } else {
          alert('註冊失敗：' + result.message);
        }
      } catch (error) {
        alert('無法連接到伺服器，請確保 Python 程式正在運行。');
      }
    }

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const formData = {
    name: document.getElementById('contactName').value,
    email: document.getElementById('contactEmail').value,
    message: document.getElementById('contactMsg').value
  };

  try {
    const response = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    const result = await response.json();
    alert(result.message);
    if (result.status === "success") {
      this.reset(); // 清空表單
    }
  } catch (error) {
    alert('送出失敗，請稍後再試');
  }
});
  </script>
</body>
</html>
