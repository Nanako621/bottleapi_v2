<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>資料登錄 - 大學生健康IoT平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 1. 字體設定 */
    @font-face {
      font-family: 'ProperScript';
      src: url('ProperScript-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --primary: #2db7d3;
      --primary-dark: #1d8fa8;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #b3ebf6 100%);
    }

    body {
      font-family: 'ProperScript', -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* 2. 頂端白色導覽列 */
    .navbar {
      width: 100%;
      height: 70px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: fixed;
      top: 0;
      z-index: 100;
      box-sizing: border-box;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      cursor: pointer;
      font-size: 24px;
      color: #6b7280;
      display: flex;
      align-items: center;
      transition: color 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { color: var(--primary); }

    .brand {
      font-size: 20px;
      font-weight: 500;
      color: #374151;
      letter-spacing: 0.02em;
    }


    /* 3. 主內容區塊容器 */
    .main-content {
      margin-top: 100px;
      padding: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 60px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    h2 { margin-top: 0; text-align: center; color: #1f2937; }

    .section-title {
      font-size: 14px;
      color: var(--primary);
      border-bottom: 1px solid #e5e7eb;
      margin: 20px 0 15px;
      padding-bottom: 5px;
      font-weight: bold;
    }

    .input-group { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; color: #4b5563; }
    
    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
      font-size: 16px;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45, 183, 211, 0.15);
    }

    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }

    /* 按鈕美化 */
    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 4px 12px rgba(45, 183, 211, 0.3);
      transition: all 0.3s ease;
    }
    button.submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(45, 183, 211, 0.4);
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="/" class="back-btn" title="返回首頁">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </a>
      <div class="brand">返回首頁 - 大學生健康IoT平台</div>
    </div>
    <div style="color:#d1d5db; font-size:20px;">◡̈</div>
  </header>

  <div class="main-content">
    <div class="box">
      <h2>資料登錄</h2>

      <div class="section-title">基本資訊</div>
      <div class="input-group">
        <label>姓名</label>
        <input id="name" type="text" placeholder="請輸入姓名">
      </div>

      <div class="input-group">
        <label>性別</label>
        <select id="gender" name="gender" required>
          <option value="" disabled selected>請選擇</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>

      <label>出生年月日</label>
      <div class="row" style="margin-bottom:14px;">
        <div><select id="birth_year"></select></div>
        <div><select id="birth_month"></select></div>
        <div><select id="birth_day"></select></div>
      </div>

      <div class="section-title">生理指標</div>
      <div class="row">
        <div class="input-group">
          <label>身高 (cm)</label>
          <select id="height"></select>
        </div>
        <div class="input-group">
          <label>體重 (kg)</label>
          <select id="weight"></select>
        </div>
      </div>

      <button class="submit-btn" onclick="saveAll()">儲存並進入監測</button>
    </div>
  </div>


  <script>
 window.addEventListener("DOMContentLoaded", async () => {
    const yearSelect = document.getElementById("birth_year");
    const monthSelect = document.getElementById("birth_month");
    const daySelect = document.getElementById("birth_day");
    const heightSelect = document.getElementById("height");
    const weightSelect = document.getElementById("weight");
    const genderSelect = document.getElementById("gender");

    // --- 1. 生成所有選單選項 ---
    const currentYear = new Date().getFullYear();
    
    // 生成年份 (1920 - 今年)
    yearSelect.innerHTML = '<option value="" disabled>請選擇</option>';
    for (let y = currentYear; y >= 1920; y--) {
        yearSelect.add(new Option(y + " 年", y));
    }

    // 生成月份 (01-12)
    monthSelect.innerHTML = '<option value="" disabled>請選擇</option>';
    for (let m = 1; m <= 12; m++) {
        const val = m.toString().padStart(2, '0');
        monthSelect.add(new Option(m + " 月", val));
    }

    // 生成日期 (01-31)
    daySelect.innerHTML = '<option value="" disabled>請選擇</option>';
    for (let d = 1; d <= 31; d++) {
        const val = d.toString().padStart(2, '0');
        daySelect.add(new Option(d + " 日", val));
    }

    // 生成身高 (50-250)
    heightSelect.innerHTML = '<option value="" disabled>請選擇</option>';
    for (let h = 50; h <= 250; h++) {
        heightSelect.add(new Option(h + " cm", h));
    }

    // 生成體重 (20-200)
    weightSelect.innerHTML = '<option value="" disabled>請選擇</option>';
    for (let w = 20; w <= 200; w++) {
        weightSelect.add(new Option(w + " kg", w));
    }

    // --- 2. 核心邏輯：從資料庫抓資料填入，若無資料則套用人性化初始值 ---
    const email = localStorage.getItem("user_email");
    if (email) {
        try {
            const response = await fetch(`/api/get_patient/${email}`);
            const res = await response.json();
            
            if (res.status === "success" && res.data) {
                // 【情境 A：舊用戶】從資料庫讀取現有資料
                document.getElementById("name").value = res.data.name || "";
                
                // 只有當資料庫有值時才覆蓋預設值
                if (res.data.gender) {
                    genderSelect.value = res.data.gender;
                } else {
                    genderSelect.value = ""; // 顯示「請選擇」
                }

                yearSelect.value = res.data.birth_year || 2005;
                monthSelect.value = res.data.birth_month ? res.data.birth_month.toString().padStart(2, '0') : "01";
                daySelect.value = res.data.birth_day ? res.data.birth_day.toString().padStart(2, '0') : "01";
                
                heightSelect.value = res.data.height ? Math.round(res.data.height) : 165;
                weightSelect.value = res.data.weight ? Math.round(res.data.weight) : 55;
                
                console.log("已載入舊用戶資料");
            } else {
                // 【情境 B：新用戶】設定你要求的初始預設值
                genderSelect.value = "";    // 1. 性別顯示「請選擇」
                yearSelect.value = 2005;    // 2. 出生年預設 2005
                monthSelect.value = "01";   // 月份預設 1 月
                daySelect.value = "01";     // 日期預設 1 日
                heightSelect.value = 165;   // 3. 身高預設 165
                weightSelect.value = 55;    // 4. 體重預設 55
                console.log("新用戶，已設定人性化初始值");
            }
        } catch (err) {
            console.error("載入資料出錯，套用預設值:", err);
            // 發生錯誤時也給予預設值
            genderSelect.value = "";
            yearSelect.value = 2005;
            heightSelect.value = 165;
            weightSelect.value = 55;
        }
    }
});

  async function saveAll() {
    const email = localStorage.getItem("user_email"); 
    const name = document.getElementById('name').value.trim();
    
    if (!email) { 
      alert("偵測不到登入資訊，請重新登入"); 
      window.location.href = 'iot_intro.html';
      return; 
    }
    
    if (!name) { 
      alert("請輸入姓名"); 
      return; 
    }
    
    const gender = document.getElementById('gender').value;
    const height = document.getElementById('height').value;
    const weight = document.getElementById('weight').value;
    
    // 檢查是否選擇了性別
    if (!gender) {
      alert("請選擇性別");
      return;
    }

    const bYear = parseInt(document.getElementById('birth_year').value);
    const bMonth = parseInt(document.getElementById('birth_month').value);
    const bDay = parseInt(document.getElementById('birth_day').value);
    const fullBirth = `${bYear}-${document.getElementById('birth_month').value}-${document.getElementById('birth_day').value}`;

    localStorage.setItem("patient_name", name);
    localStorage.setItem("patient_gender", gender);
    localStorage.setItem("patient_birth", fullBirth);
    
    const localData = JSON.parse(localStorage.getItem("patient_data") || "{}");
    localData.height = Number(height);
    localData.weight = Number(weight);
    localStorage.setItem("patient_data", JSON.stringify(localData));

    const payload = {
      email: email,
      name: name,
      birth_year: bYear,
      birth_month: bMonth,
      birth_day: bDay,
      gender: gender,
      height: Number(height),
      weight: Number(weight)
    };

    try {
      const response = await fetch('/api/patient_entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      const result = await response.json();
      if (response.ok) {
        alert('資料儲存成功！');
        localStorage.removeItem("edit_mode");
        window.location.href = 'realmedashboard.html';
      } else {
        alert('同步失敗：' + (result.message || '未知錯誤'));
      }
    } catch (error) {
      console.error("Fetch error:", error);
      alert('無法連接到伺服器，資料已先暫存於瀏覽器。');
      window.location.href = 'realmedashboard.html';
    }
  }
</script>
</body>
</html>
